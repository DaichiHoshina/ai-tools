name: spec-driven
description: 仕様駆動マルチエージェント開発（仕様レビュー→Codexレビュー→実装→受入検査→修正→簡素化）
max_steps: 25
loop_limit: 3

steps:
  - name: spec_review
    agent: spec-reviewer
    mode: readonly
    retry: 1
    timeout: 120
    rules:
      - on: pass
        next: codex_review
      - on: fail
        next: ABORT

  - name: codex_review
    agent: codex-reviewer
    mode: readonly
    provider: codex
    retry: 1
    timeout: 180
    rules:
      - on: pass
        next: implement
      - on: fail
        next: ABORT

  - name: implement
    agent: developer
    mode: edit
    retry: 2
    timeout: 300
    rules:
      - on: done
        next: acceptance_review
      - on: blocked
        next: ABORT
      - on: needs_input
        next: implement
        ask_user: true

  - name: acceptance_review
    parallel:
      - agent: acceptor
        mode: readonly
      - agent: ai-reviewer
        mode: readonly
    timeout: 180
    rules:
      - on: all_pass
        next: simplify
      - on: any_fail
        next: fix
      - on: spec_issue
        next: implement

  - name: fix
    agent: fixer
    mode: edit
    retry: 2
    timeout: 300
    fallback:
      next: implement
    rules:
      - on: done
        next: acceptance_review
      - on: blocked
        next: implement

  - name: simplify
    agent: simplifier
    mode: edit
    retry: 1
    timeout: 180
    fallback:
      next: COMPLETE
    rules:
      - on: done
        next: COMPLETE
