version: 1
name: tdd
description: TDD開発（テスト作成→実装→レビュー→修正→簡素化→検証）
max_steps: 22
loop_limit: 3

defaults:
  retry: 1
  timeout: 180
  mode: readonly  # mode 未指定ステップは readonly として起動

steps:
  - name: test_write
    agent: test-writer
    mode: edit
    retry: 2
    timeout: 240
    rules:
      - on: done
        next: implement
      - on: blocked
        next: ABORT
      - on: needs_input
        next: test_write
        ask_user: true
      - on: error
        next: ABORT

  - name: implement
    agent: developer
    mode: edit
    retry: 2
    timeout: 300
    rules:
      - on: done
        next: review
      - on: blocked
        next: ABORT
      - on: needs_input
        next: implement
        ask_user: true
      - on: error
        next: ABORT

  - name: review
    agent: ai-reviewer
    timeout: 120
    rules:
      - on: pass
        next: simplify
      - on: fail
        next: fix
      - on: error
        next: fix

  - name: fix
    agent: fixer
    mode: edit
    retry: 2
    timeout: 300
    rules:
      - on: done
        next: review
      - on: blocked
        next: implement
      - on: error
        next: implement

  - name: simplify
    agent: simplifier
    mode: edit
    rules:
      - on: done
        next: verify
      - on: blocked
        next: verify
      - on: error
        next: fix

  - name: verify
    agent: verifier
    timeout: 300
    rules:
      - on: pass
        next: COMPLETE
      - on: fail
        next: fix
      - on: error
        next: COMPLETE
