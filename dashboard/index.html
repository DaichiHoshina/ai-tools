<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code LaunchAgent Jobs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d1117;
    --card:        #161b22;
    --border:      #30363d;
    --text:        #c9d1d9;
    --text-muted:  #8b949e;
    --blue:        #58a6ff;
    --green:       #3fb950;
    --yellow:      #d29922;
    --red:         #f85149;
    --err-bg:      #2d1517;
    --err-text:    #ff7b72;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 80px;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
  }

  header .refreshed {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .job {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    background: var(--card);
  }

  .job-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .job-name {
    font-size: 15px;
    font-weight: 600;
  }

  .job-schedule {
    color: var(--text-muted);
    font-size: 12px;
  }

  .err-badge {
    background: var(--red);
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
  }

  .job-status-text {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 12px;
  }

  .job-meta {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 8px;
  }

  details summary {
    cursor: pointer;
    color: var(--blue);
    font-size: 12px;
    padding: 4px 0;
  }

  details pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    max-height: 400px;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: "SF Mono", Monaco, "Cascadia Code", "Consolas", monospace;
  }

  details pre.err {
    background: var(--err-bg);
    border-color: var(--red);
    color: var(--err-text);
  }

  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 16px;
    background: var(--card);
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
  }

  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>LaunchAgent Jobs</h1>
    <span class="refreshed" id="refreshedAt"></span>
  </header>

  <div id="jobs"><div class="empty-state">Loading...</div></div>
</main>

<div class="status-bar" id="statusBar">Initializing...</div>

<script>
function fmtSize(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

function fmtMtime(iso) {
  if (!iso) return 'never';
  const d = new Date(iso);
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return diffMin + 'm ago';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + 'h ago';
  return Math.floor(diffHr / 24) + 'd ago';
}

function makeEl(tag, opts) {
  const el = document.createElement(tag);
  if (opts) {
    if (opts.text !== undefined) el.textContent = opts.text;
    if (opts.className) el.className = opts.className;
    if (opts.style) el.setAttribute('style', opts.style);
  }
  return el;
}

function statusInfo(j) {
  if (!j.installed) return { color: 'var(--text-muted)', text: 'not installed' };
  if (!j.loaded) return { color: 'var(--red)', text: 'unloaded' };
  if (j.pid !== null) return { color: 'var(--blue)', text: 'running (pid ' + j.pid + ')' };
  if (j.last_exit === null) return { color: 'var(--green)', text: 'idle (not fired yet)' };
  if (j.last_exit === 0) return { color: 'var(--green)', text: 'idle (last ok)' };
  return { color: 'var(--yellow)', text: 'idle (last exit ' + j.last_exit + ')' };
}

function renderJob(j) {
  const status = statusInfo(j);

  const wrap = makeEl('div', { className: 'job' });

  const header = makeEl('div', { className: 'job-header' });
  const dot = makeEl('span', { className: 'status-dot' });
  dot.style.background = status.color;
  header.appendChild(dot);
  header.appendChild(makeEl('span', { className: 'job-name', text: j.name }));
  header.appendChild(makeEl('span', { className: 'job-schedule', text: j.schedule }));

  if (j.err_size > 0) {
    header.appendChild(makeEl('span', {
      className: 'err-badge',
      text: 'ERR ' + fmtSize(j.err_size),
    }));
  }

  header.appendChild(makeEl('span', { className: 'job-status-text', text: status.text }));
  wrap.appendChild(header);

  wrap.appendChild(makeEl('div', {
    className: 'job-meta',
    text: 'log: ' + fmtSize(j.log_size) + ' · ' + fmtMtime(j.log_mtime),
  }));

  const details = document.createElement('details');
  details.setAttribute('open', '');

  details.appendChild(makeEl('summary', { text: 'log tail (last 30 lines)' }));
  details.appendChild(makeEl('pre', { text: j.log_tail || '(empty)' }));

  if (j.err_tail) {
    details.appendChild(makeEl('pre', { className: 'err', text: j.err_tail }));
  }

  wrap.appendChild(details);
  return wrap;
}

async function loadJobs() {
  const box = document.getElementById('jobs');
  try {
    const resp = await fetch('/api/launchd', { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    box.textContent = '';
    if (!data.jobs || data.jobs.length === 0) {
      box.appendChild(makeEl('div', { className: 'empty-state', text: 'no jobs' }));
    } else {
      data.jobs.forEach(function(j) { box.appendChild(renderJob(j)); });
    }

    const now = new Date().toLocaleTimeString('ja-JP');
    document.getElementById('refreshedAt').textContent = 'refreshed ' + now;
    document.getElementById('statusBar').textContent =
      'auto-refresh: 15s · log dir: ~/.claude/logs/launchd/';
  } catch (err) {
    box.textContent = '';
    box.appendChild(makeEl('div', {
      className: 'empty-state',
      text: 'API error: ' + err.message,
      style: 'color: var(--red);',
    }));
    document.getElementById('statusBar').textContent = 'Error — check console for details.';
    console.error('[dashboard]', err);
  }
}

loadJobs();
setInterval(loadJobs, 15000);
</script>
</body>
</html>
