name: ai-tools-workflow
description: ai-tools標準ワークフロー（簡素化版plan→implement→review→fix）
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 20
initial_movement: plan
movements:
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch
      - mcp__serena__find_symbol
      - mcp__serena__get_symbols_overview
      - mcp__serena__search_for_pattern
      - mcp__serena__find_referencing_symbols
      - mcp__serena__read_file
      - mcp__serena__list_dir
    rules:
      - condition: 要件が明確で実装可能
        next: implement
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan

  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
      - mcp__serena__find_symbol
      - mcp__serena__get_symbols_overview
      - mcp__serena__search_for_pattern
      - mcp__serena__find_referencing_symbols
      - mcp__serena__read_file
      - mcp__serena__replace_symbol_body
      - mcp__serena__insert_after_symbol
      - mcp__serena__insert_before_symbol
      - mcp__serena__replace_content
      - mcp__serena__rename_symbol
      - mcp__serena__list_dir
      - mcp__serena__execute_shell_command
    required_permission_mode: edit
    instruction: implement
    rules:
      - condition: 実装が完了した
        next: reviewers
      - condition: 実装を進行できない
        next: ABORT
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions

  - name: reviewers
    parallel:
      - name: code_review
        edit: false
        persona: supervisor
        policy: review
        knowledge: architecture
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
          - mcp__serena__find_symbol
          - mcp__serena__get_symbols_overview
          - mcp__serena__search_for_pattern
          - mcp__serena__find_referencing_symbols
          - mcp__serena__read_file
          - mcp__serena__list_dir
        instruction: supervise
        rules:
          - condition: すべて問題なし
          - condition: 要求未達成、テスト失敗、ビルドエラー
        output_contracts:
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
      - name: ai_review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
        instruction: review-ai
        rules:
          - condition: AI特有の問題なし
          - condition: AI特有の問題あり
        output_contracts:
          report:
            - name: ai-review.md
              format: ai-review
    rules:
      - condition: all("すべて問題なし", "AI特有の問題なし")
        next: COMPLETE
      - condition: any("要求未達成、テスト失敗、ビルドエラー", "AI特有の問題あり")
        next: fix

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
      - mcp__serena__find_symbol
      - mcp__serena__get_symbols_overview
      - mcp__serena__search_for_pattern
      - mcp__serena__find_referencing_symbols
      - mcp__serena__read_file
      - mcp__serena__replace_symbol_body
      - mcp__serena__insert_after_symbol
      - mcp__serena__insert_before_symbol
      - mcp__serena__replace_content
      - mcp__serena__rename_symbol
      - mcp__serena__list_dir
      - mcp__serena__execute_shell_command
    required_permission_mode: edit
    pass_previous_response: false
    instruction: fix-supervisor
    rules:
      - condition: 修正が完了した
        next: reviewers
      - condition: 修正を進行できない
        next: implement
