name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install shellcheck
          fi

      - name: Run shellcheck
        run: |
          find claude-code -name "*.sh" -type f -print0 | xargs -0 shellcheck --severity=warning

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-markdownlint-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-npm-markdownlint-

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint '**/*.md'

  bats-integration-test:
    name: BATS Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-bats-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-npm-bats-

      - name: Install bats-core and jq
        run: |
          npm install -g bats
          sudo apt-get install -y jq

      - name: Run BATS integration tests
        run: |
          find claude-code/tests/integration -name "*.bats" -print0 | xargs -0 bats

  bats-test:
    name: BATS Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-bats-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: ${{ runner.os }}-npm-bats-

      - name: Install bats-core
        run: npm install -g bats

      - name: Run BATS tests
        run: |
          find claude-code/tests/unit -name "*.bats" -print0 | xargs -0 bats

  install-test:
    name: Install Script Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run install test
        run: bash scripts/test-install.sh

  sync-test:
    name: Sync Script Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run sync test
        run: bash scripts/test-sync.sh
